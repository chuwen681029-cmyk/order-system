<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🧺 取餐管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#2d8a4e;--green-l:#52b788;--green-bg:#d8f3dc;--amber:#d97706;--amber-bg:#fef3c7;--red:#dc2626;--red-bg:#fee2e2;--g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;--g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;--g800:#1e293b;--radius:12px;--shadow:0 2px 8px rgba(0,0,0,.08)}
body{font-family:'Noto Sans TC',sans-serif;background:var(--g100);color:var(--g800);min-height:100vh}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a5c35 0%,#2d8a4e 100%)}
.login-card{background:#fff;border-radius:16px;padding:36px 32px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-logo{text-align:center;font-size:42px;margin-bottom:8px}
.login-title{text-align:center;font-size:18px;font-weight:700;margin-bottom:4px}
.login-sub{text-align:center;font-size:13px;color:var(--g500);margin-bottom:24px}
.lbl{font-size:12px;color:var(--g600);font-weight:500;margin-bottom:5px}
.fc{width:100%;padding:10px 13px;border:1.5px solid var(--g200);border-radius:9px;font-size:14px;font-family:inherit;background:#fff;color:var(--g800);outline:none;appearance:none;-webkit-appearance:none;transition:border-color .18s;margin-bottom:12px}
.fc:focus{border-color:var(--green-l)}
.btn-login{width:100%;padding:13px;border-radius:11px;border:none;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--green);color:#fff;transition:all .15s}
.btn-login:hover{background:#1e5c38}
.btn-login:active{transform:scale(.97)}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:8px;min-height:20px}
.topbar{background:var(--green);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,80,0,.25)}
.topbar-title{font-size:17px;font-weight:700}
.topbar-info{font-size:11px;opacity:.8;margin-top:2px}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-link{background:rgba(255,255,255,.18);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;text-decoration:none}
.tb-link:hover{background:rgba(255,255,255,.3)}
.logout-btn{background:rgba(255,0,0,.25);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.logout-btn:hover{background:rgba(255,0,0,.4)}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--g200);margin-bottom:16px}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:15px;font-weight:700}
.card-bd{padding:16px 18px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border-radius:var(--radius);border:1px solid var(--g200);padding:14px 16px;text-align:center;box-shadow:var(--shadow)}
.stat-lbl{font-size:12px;color:var(--g500);margin-bottom:4px;font-weight:500}
.stat-val{font-size:28px;font-weight:700}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-amber{color:var(--amber)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--green);color:#fff;padding:9px 12px;font-weight:500;text-align:center;white-space:nowrap}
.tbl th:first-child{text-align:left}
.tbl td{padding:8px 12px;text-align:center;border-bottom:1px solid var(--g100)}
.tbl td:first-child{text-align:left;font-weight:500}
.tbl tr:hover td{background:var(--g50)}
.rem{color:var(--red);font-weight:700}
.done-c{color:var(--green-l);font-weight:600}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 16px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--g200);margin-bottom:16px}
.filter-bar label{font-size:13px;color:var(--g500);font-weight:500}
select.sf{padding:7px 10px;border:1px solid var(--g300);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:var(--g700);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;min-width:110px}
.dept-block{margin-bottom:20px}
.dept-head{font-size:14px;font-weight:700;color:var(--g700);padding:8px 14px;background:var(--g100);border-radius:8px;margin-bottom:10px;border-left:4px solid var(--green-l)}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.sc{background:#fff;border:2px solid var(--g200);border-radius:var(--radius);padding:14px;transition:all .18s}
.sc:hover:not(.sc-done){border-color:var(--green-l);box-shadow:0 4px 12px rgba(45,138,78,.12);transform:translateY(-1px)}
.sc-done{opacity:.4}
.sc-name{font-size:14px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sc-emp{font-size:11px;background:var(--g100);color:var(--g500);padding:2px 6px;border-radius:4px;font-weight:600}
.sc-dept{font-size:12px;color:var(--g400);margin-bottom:8px}
.sc-meals{font-size:12px;color:var(--g700);line-height:2}
.sc-meal-row{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--g100)}
.sc-meal-row:last-child{border:none}
.sc-meal-lbl{font-size:11px;color:var(--g500);min-width:70px;flex-shrink:0}
.sc-meal-name{font-size:12px;color:var(--g800);font-weight:600}
.sc-meal-qty{font-size:12px;color:var(--green);font-weight:700;margin-left:auto}
.sc-btn{margin-top:10px;padding:9px 0;width:100%;border:none;border-radius:8px;background:var(--green-bg);color:var(--green);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.sc-btn:hover:not(:disabled){background:var(--green-l);color:#fff}
.sc-btn:disabled{background:var(--g100);color:var(--g400);cursor:not-allowed}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-o{background:var(--g100);color:var(--g700);border:1px solid var(--g200)}.btn-o:hover{background:var(--g200)}
.btn-exp{background:#0f766e;color:#fff}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700}
.bdg-g{background:var(--green-bg);color:var(--green)}
.live-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#toast{position:fixed;bottom:20px;right:20px;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;z-index:9999;opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.tg{background:var(--green)}#toast.tr{background:var(--red)}
.no-data{text-align:center;color:var(--g400);padding:32px;font-size:14px}
.tbl-wrap{overflow-x:auto}
</style>
</head>
<body>

<!-- 登入畫面 -->
<div id="login-wrap" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">🧺</div>
    <div class="login-title">取餐管理系統</div>
    <div class="login-sub">請使用管理員帳號登入</div>
    <div class="lbl">員編</div>
    <input class="fc" id="l-emp" placeholder="例：Y00780" maxlength="10"
      oninput="this.value=this.value.toUpperCase()"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="lbl">密碼（預設與員編相同）</div>
    <input class="fc" id="l-pwd" type="password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">登入 →</button>
    <div class="login-err" id="login-err"></div>
    <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--g400)">
      <a href="03-admin.html" style="color:var(--green)">前往後台管理 →</a>
    </div>
  </div>
</div>

<!-- 主畫面 -->
<div id="main-wrap" style="display:none">
<div class="topbar">
  <div>
    <div class="topbar-title">🧺 取餐管理系統</div>
    <div class="topbar-info" id="top-info">連線中...</div>
  </div>
  <div class="tb-right">
    <span id="user-badge" class="badge bdg-g"></span>
    <a class="tb-link" href="01-order.html">🍱 訂餐</a>
    <a class="tb-link" href="03-admin.html">⚙️ 後台</a>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </div>
</div>
<div id="toast"></div>
<div class="wrap">
  <div class="filter-bar">
    <label>日期：</label><select class="sf" id="flt-date" onchange="render()"></select>
    <label>部門：</label><select class="sf" id="flt-dept" onchange="render()"><option value="">全部</option></select>
    <label>地點：</label><select class="sf" id="flt-loc" onchange="render()"><option value="">全部</option><option value="douliou">斗六院區</option><option value="huwei">虎尾院區</option></select>
    <label>狀態：</label><select class="sf" id="flt-status" onchange="render()"><option value="">全部</option><option value="pending">待領取</option><option value="done">已領取</option></select>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn btn-o" onclick="window.print()">🖨️ 列印</button>
      <button class="btn btn-exp" onclick="exportCSV()">📥 匯出 CSV</button>
    </div>
  </div>
  <div class="stats" id="stats-row"></div>
  <div class="card">
    <div class="card-hd">
      <div class="card-title">📊 份數彙總 <span class="live-dot" style="margin-left:8px"></span></div>
      <span class="badge bdg-g" id="sync-badge">同步中...</span>
    </div>
    <div class="card-bd" style="padding:0"><div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>餐別</th><th>菜名</th><th>飯種</th><th>訂購</th><th>已領</th><th>未領</th></tr></thead>
        <tbody id="sum-tbody"></tbody>
      </table>
    </div></div>
  </div>
  <div id="cards-area"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhIzxK291vy2HpbJSMBXK7-eI5RFeusvw",
  authDomain: "ylh-meal-order-system.firebaseapp.com",
  databaseURL: "https://ylh-meal-order-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ylh-meal-order-system",
  storageBucket: "ylh-meal-order-system.firebasestorage.app",
  messagingSenderId: "605808046207",
  appId: "1:605808046207:web:970ff25e7be3cfcfb24f4a"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
let DB={menus:{},admins:{},staff:{},orders:{}};
let loggedAdmin=null;
let dbReady=false;

const $=id=>document.getElementById(id);
function dishLbl(d){return{main1:'主菜一',main2:'主菜二',veg:'素食',dinnerMain1:'晚餐主菜一',dinnerMain2:'晚餐主菜二',dinnerVeg:'晚餐素食'}[d]||d}
function dishName(d,menu){if(!menu)return dishLbl(d);return menu[d]||dishLbl(d);}
function riceLbl(r){return r==='white'?'白飯':'養生飯'}
function locLbl(l){return l==='douliou'?'斗六院區':'虎尾院區'}
function typeLbl(t){return t==='lunch'?'午餐':'晚餐'}
function fmtD(d){return d?d.replace(/-/g,'/'):''}
function toast(msg,cls='tg'){const el=$('toast');if(!el)return;el.textContent=msg;el.className='show '+cls;clearTimeout(el._t);el._t=setTimeout(()=>el.className='',2600)}
function setLoginErr(msg){const e=$('login-err');if(e)e.textContent=msg}

function updateClock(){
  const el=$('top-info');if(!el)return;
  el.textContent=new Date().toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',weekday:'short',hour:'2-digit',minute:'2-digit'})+(loggedAdmin?' — 即時同步':'');
}
setInterval(updateClock,1000);

onValue(ref(db,'/'),snap=>{
  DB=snap.val()||{menus:{},admins:{},staff:{},orders:{}};
  dbReady=true;
  const t=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  const sb=$('sync-badge');if(sb)sb.textContent='已同步 '+t;
  if(loggedAdmin){populateDateDrop();render();}
  updateClock();
});

function doLogin(){
  const emp=$('l-emp').value.trim().toUpperCase();
  const pwd=$('l-pwd').value.trim().toUpperCase();
  setLoginErr('');
  if(!dbReady){setLoginErr('資料庫連線中，請稍後...');return;}
  if(!emp){setLoginErr('請輸入員編');return;}
  if(!pwd){setLoginErr('請輸入密碼');return;}
  const adm=(DB.admins||{})[emp];
  if(!adm){setLoginErr('⚠️ 查無此員編，請確認是否在管理員名冊中');return;}
  if(pwd!==emp){setLoginErr('⚠️ 密碼錯誤（預設密碼與員編相同）');return;}
  loggedAdmin=adm;
  $('login-wrap').style.display='none';
  $('main-wrap').style.display='block';
  $('user-badge').textContent=adm.name+'（'+adm.dept+'）';
  populateDateDrop();render();
  toast('歡迎，'+adm.name+'！','tg');
}

function doLogout(){
  loggedAdmin=null;
  $('l-emp').value='';$('l-pwd').value='';setLoginErr('');
  $('main-wrap').style.display='none';
  $('login-wrap').style.display='flex';
}

function populateDateDrop(){
  const sel=$('flt-date');if(!sel)return;
  const cur=sel.value;sel.innerHTML='';
  Object.keys(DB.menus||{}).sort().forEach(d=>{
    const m=DB.menus[d];if(m.holiday)return;
    const opt=document.createElement('option');
    opt.value=d;opt.textContent=fmtD(d);
    if(d===cur)opt.selected=true;
    sel.appendChild(opt);
  });
  if(!sel.value&&sel.options.length)sel.value=sel.options[0].value;
}

function render(){
  if(!loggedAdmin)return;
  const dateStr=$('flt-date').value;
  const deptF=$('flt-dept').value;
  const locF=$('flt-loc').value;
  const statF=$('flt-status').value;
  const menu=(DB.menus||{})[dateStr];

  const allOrds=Object.values(DB.orders||{}).filter(o=>o.date===dateStr);

  /* Dept dropdown */
  const depts=[...new Set(allOrds.map(o=>o.dept))].sort();
  const deptSel=$('flt-dept');const prevDept=deptSel.value;
  deptSel.innerHTML='<option value="">全部</option>'+depts.map(d=>`<option value="${d}"${d===prevDept?' selected':''}>${d}</option>`).join('');

  /* Stats */
  const total=allOrds.reduce((s,o)=>s+o.qty,0);
  const done=allOrds.filter(o=>o.status==='done').reduce((s,o)=>s+o.qty,0);
  const people=new Set(allOrds.map(o=>o.emp)).size;
  $('stats-row').innerHTML=`
    <div class="stat"><div class="stat-lbl">總訂份數</div><div class="stat-val">${total}</div></div>
    <div class="stat"><div class="stat-lbl">已領取</div><div class="stat-val c-green">${done}</div></div>
    <div class="stat"><div class="stat-lbl">未領取</div><div class="stat-val c-red">${total-done}</div></div>
    <div class="stat"><div class="stat-lbl">訂餐人數</div><div class="stat-val c-amber">${people}</div></div>`;

  /* Summary table — 顯示實際菜名 */
  const DISH_KEYS=['main1','main2','veg','dinnerMain1','dinnerMain2','dinnerVeg'];
  let sb='';
  DISH_KEYS.forEach(dk=>{
    ['white','health'].forEach(r=>{
      const rows=allOrds.filter(o=>o.dish===dk&&o.rice===r);
      const t=rows.reduce((s,o)=>s+o.qty,0);if(!t)return;
      const dn=rows.filter(o=>o.status==='done').reduce((s,o)=>s+o.qty,0);
      /* 菜名：先從訂單取 dishName，再從菜單取，最後用 dishLbl */
      const nm=rows[0]?.dishName||dishName(dk,menu);
      sb+=`<tr>
        <td>${dishLbl(dk)}</td>
        <td style="text-align:left;font-weight:600;color:var(--g800)">${nm}</td>
        <td>${riceLbl(r)}</td>
        <td>${t}</td>
        <td class="done-c">${dn}</td>
        <td class="${t-dn>0?'rem':''}">${t-dn}</td>
      </tr>`;
    });
  });
  $('sum-tbody').innerHTML=sb||'<tr><td colspan="6" class="no-data">今日無訂單</td></tr>';

  /* Filtered for cards */
  let filtered=[...allOrds];
  if(deptF)filtered=filtered.filter(o=>o.dept===deptF);
  if(locF) filtered=filtered.filter(o=>o.loc===locF);
  if(statF)filtered=filtered.filter(o=>o.status===statF);

  const byEmp={};
  filtered.forEach(o=>{
    if(!byEmp[o.emp])byEmp[o.emp]={emp:o.emp,name:o.name,dept:o.dept,items:[]};
    byEmp[o.emp].items.push(o);
  });
  const byDept={};
  Object.values(byEmp).forEach(u=>{if(!byDept[u.dept])byDept[u.dept]=[];byDept[u.dept].push(u);});

  let html='';
  if(!Object.keys(byDept).length)html='<div class="no-data">⚠️ 無符合條件的訂單</div>';

  Object.keys(byDept).sort().forEach(dept=>{
    html+=`<div class="dept-block"><div class="dept-head">🏥 ${dept}</div><div class="staff-grid">`;
    byDept[dept].sort((a,b)=>{
      const ad=a.items.every(i=>i.status==='done'),bd=b.items.every(i=>i.status==='done');
      return ad===bd?0:ad?1:-1;
    }).forEach(u=>{
      const allDone=u.items.every(i=>i.status==='done');
      /* 合併同 dish+rice，顯示實際菜名 */
      const merged={};
      u.items.forEach(o=>{
        const k=o.dish+'-'+o.rice;
        if(!merged[k]) merged[k]={lbl:dishLbl(o.dish),nm:o.dishName||dishName(o.dish,menu),rice:riceLbl(o.rice),qty:0};
        merged[k].qty+=o.qty;
      });
      const mealRows=Object.values(merged).map(m=>
        `<div class="sc-meal-row">
          <span class="sc-meal-lbl">${m.lbl}／${m.rice}</span>
          <span class="sc-meal-name">${m.nm}</span>
          <span class="sc-meal-qty">× ${m.qty}</span>
        </div>`
      ).join('');
      const locs=[...new Set(u.items.map(o=>locLbl(o.loc)))].join('、');
      const types=[...new Set(u.items.map(o=>typeLbl(o.mealType)))].join('、');
      html+=`
      <div class="sc ${allDone?'sc-done':''}">
        <div class="sc-name">${allDone?'✅':'🙋'}&nbsp;${u.name}<span class="sc-emp">${u.emp}</span></div>
        <div class="sc-dept">🏥 ${u.dept}　📍 ${locs}　${types}</div>
        <div class="sc-meals" style="margin-top:8px">${mealRows}</div>
        <button class="sc-btn" ${allDone?'disabled':''} onclick="markDone('${u.emp}','${dateStr}')">
          ${allDone?'✅ 已領取':'點此確認取餐'}
        </button>
      </div>`;
    });
    html+='</div></div>';
  });
  $('cards-area').innerHTML=html;
}

async function markDone(emp,dateStr){
  const updates={};
  Object.values(DB.orders||{}).filter(o=>o.emp===emp&&o.date===dateStr)
    .forEach(o=>{updates['orders/'+o.id+'/status']='done';});
  await update(ref(db,'/'),updates);
  toast('✅ '+emp+' 取餐完成！','tg');
}

function exportCSV(){
  const dateStr=$('flt-date').value;
  const ords=Object.values(DB.orders||{}).filter(o=>o.date===dateStr);
  const menu=(DB.menus||{})[dateStr];
  const rows=[['員編','姓名','部門','日期','餐別','地點','類別','菜名','飯種','份數','狀態']];
  ords.forEach(o=>{
    const nm=o.dishName||dishName(o.dish,menu);
    rows.push([o.emp,o.name,o.dept,o.date,typeLbl(o.mealType),locLbl(o.loc),dishLbl(o.dish),nm,riceLbl(o.rice),o.qty,o.status==='done'?'已領取':'待領取']);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`取餐明細_${dateStr}.csv`;a.click();
  toast('已匯出 CSV！','tg');
}

window.doLogin=doLogin;window.doLogout=doLogout;
window.render=render;window.markDone=markDone;window.exportCSV=exportCSV;
</script>
</body>
