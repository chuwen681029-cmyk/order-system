<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🍱 實習生訂餐</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--green:#06C755;--green-d:#04a541;--green-bg:#e8f5e9;--green-pale:#f0fdf4;--orange:#f97316;--red:#dc2626;--red-bg:#fee2e2;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-400:#9ca3af;--gray-600:#4b5563;--gray-800:#1f2937;--radius:12px;--shadow:0 2px 10px rgba(0,0,0,.10)}
body{font-family:'Noto Sans TC',sans-serif;background:#b9dfc0;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.shell{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column;background:#c8e6c9}
.top-bar{background:var(--green);color:#fff;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 6px rgba(0,100,0,.3);flex-shrink:0}
.top-title{font-size:16px;font-weight:700}
.top-sub{font-size:11px;opacity:.82;margin-top:1px}
.top-logout{font-size:13px;background:rgba(255,255,255,.18);border:none;color:#fff;padding:5px 10px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:500}
.chat{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:#81c784;border-radius:2px}
.row{display:flex;gap:9px;align-items:flex-start}
.av{width:34px;height:34px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-top:2px}
.bub{background:#fff;border-radius:4px 14px 14px 14px;padding:12px 14px;font-size:14px;line-height:1.7;box-shadow:0 1px 4px rgba(0,0,0,.08);max-width:90%}
.bub b{font-weight:700}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;width:100%}
.card-hd{background:var(--green);color:#fff;padding:11px 15px;font-size:14px;font-weight:700}
.card-bd{padding:15px}
.steps{display:flex;gap:5px;justify-content:center;margin-bottom:2px}
.sd{height:5px;flex:1;border-radius:3px;background:#a5d6a7;transition:background .25s}
.sd.on{background:var(--green)}
.fl{display:flex;flex-direction:column;gap:11px}
.lbl{font-size:12px;color:var(--gray-600);font-weight:500;margin-bottom:4px}
.fc{width:100%;padding:10px 13px;border:1.5px solid var(--gray-200);border-radius:9px;font-size:14px;font-family:inherit;background:#fff;color:var(--gray-800);outline:none;appearance:none;-webkit-appearance:none;transition:border-color .18s}
.fc:focus{border-color:var(--green)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* 餐別分隔標題 */
.meal-section-hd{font-size:13px;font-weight:700;color:#fff;background:var(--green);padding:7px 12px;border-radius:8px;margin:12px 0 8px;display:flex;align-items:center;gap:6px}
.meal-section-hd.dinner{background:#7c3aed}

.mi{border:2px solid var(--gray-200);border-radius:11px;padding:12px;margin-bottom:8px;transition:all .15s}
.mi.sel{border-color:var(--green);background:var(--green-pale)}
.mi.sold{opacity:.38;pointer-events:none}
.mi-name{font-size:14px;font-weight:700;color:var(--gray-800);margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mi-sub{font-size:12px;color:var(--gray-600);font-weight:400}
.sold-tag{background:var(--red-bg);color:var(--red);font-size:11px;padding:2px 7px;border-radius:999px;font-weight:700}
.limit-tag{background:#fef9c3;color:#854d0e;font-size:11px;padding:2px 7px;border-radius:999px;font-weight:600}
.qty-row{display:flex;align-items:center;gap:10px}
.ql{font-size:12px;color:var(--gray-400)}
.qb{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--gray-200);background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all .15s;color:var(--gray-600);flex-shrink:0}
.qb:active{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.qn{font-size:16px;font-weight:700;min-width:24px;text-align:center}
.cart{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:10px;padding:12px;margin-top:4px}
.cart-t{font-size:13px;font-weight:700;color:var(--gray-800);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cr{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--gray-100);color:var(--gray-800)}
.cr:last-child{border:none}
.ct{font-size:13px;font-weight:700;color:var(--green);text-align:right;margin-top:7px}
.ce{font-size:13px;color:var(--gray-400);text-align:center;padding:8px 0}
.ci{font-size:13px;color:var(--gray-600);line-height:2.1;margin-bottom:12px;background:var(--gray-50);padding:10px 12px;border-radius:9px}
.btn{width:100%;padding:13px;border-radius:11px;border:none;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-g{background:var(--green);color:#fff}
.btn-g:hover{background:var(--green-d)}
.btn-gy{background:var(--gray-100);color:var(--gray-800);border:1px solid var(--gray-200)}
.btn-o{background:var(--orange);color:#fff}
.btn-link{background:none;border:none;color:var(--green);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;padding:4px 0;text-decoration:underline;display:block;text-align:center;width:100%}
.brow{display:flex;gap:8px}
.brow .btn{flex:1}
.al{padding:10px 13px;border-radius:9px;font-size:13px;display:flex;gap:8px;line-height:1.5;align-items:flex-start}
.al-r{background:var(--red-bg);border:1px solid #fca5a5;color:#7f1d1d}
.al-y{background:#fef9c3;border:1px solid #fde68a;color:#713f12}
.suc{text-align:center;padding:20px 10px}
.suc-ico{font-size:52px;margin-bottom:10px}
.suc-t{font-size:18px;font-weight:700;margin-bottom:8px}
.suc-sub{font-size:13px;color:var(--gray-600);line-height:1.9}
.pcard{border:2px solid var(--gray-200);border-radius:11px;padding:14px;margin-bottom:8px;background:#fff;transition:all .2s}
.pcard.done{opacity:.4}
.pc-name{font-size:15px;font-weight:700;margin-bottom:4px}
.pc-items{font-size:13px;color:var(--gray-600);line-height:1.9;margin-bottom:10px}
.rmenu{background:#ddd;display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:2px;flex-shrink:0}
.rmb{background:#fff;border:none;padding:14px 10px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:5px;color:#333;transition:background .15s}
.rmb:active{background:var(--green-pale)}
.rmi{font-size:26px}
.pnl{display:none}
.pnl.on{display:flex;flex-direction:column;gap:10px}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
.bdg-o{background:#fef3c7;color:#92400e}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.loading-spinner{width:40px;height:40px;border:4px solid var(--green-bg);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:360px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--gray-400);margin-bottom:14px}
.modal-item{font-size:13px;padding:6px 0;border-bottom:1px solid var(--gray-100);display:flex;justify-content:space-between}
.modal-item:last-child{border:none}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns .btn{flex:1;padding:11px;font-size:14px}
</style>
</head>
<body>
<div class="shell">
<div class="top-bar">
  <div><div class="top-title">🍱 實習生訂餐系統</div><div class="top-sub" id="bar-sub">連線中...</div></div>
  <button class="top-logout" id="logout-btn" onclick="doLogout()" style="display:none">登出</button>
</div>
<div class="chat" id="chat">

  <div id="pnl-login" class="pnl on">
    <div class="row"><div class="av">🤖</div>
      <div class="bub">👋 歡迎使用<b>實習生訂餐系統</b>！請輸入員編登入。<br><small style="opacity:.7">格式：V0XXXX 或 Y0XXXX</small></div>
    </div>
    <div class="card">
      <div class="card-hd">🔑 員編登入</div>
      <div class="card-bd fl">
        <div><div class="lbl">員編</div>
          <input class="fc" id="inp-emp" placeholder="例：V08123" maxlength="10"
            oninput="this.value=this.value.toUpperCase()"
            onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div id="login-err"></div>
        <button class="btn btn-g" onclick="doLogin()">登入 →</button>
        <button class="btn-link" onclick="showRegister()">第一次使用？點此填寫資料</button>
      </div>
    </div>
  </div>

  <div id="pnl-register" class="pnl">
    <div class="row"><div class="av">🤖</div>
      <div class="bub">請填寫基本資料，完成後下次直接用員編登入。</div>
    </div>
    <div class="card">
      <div class="card-hd">📝 填寫個人資料</div>
      <div class="card-bd fl">
        <div><div class="lbl">員編</div><input class="fc" id="reg-emp" placeholder="V08XXX" maxlength="10" oninput="this.value=this.value.toUpperCase()"></div>
        <div><div class="lbl">單位 / 部門</div><input class="fc" id="reg-dept" placeholder="例：骨科部、護理部"></div>
        <div><div class="lbl">姓名</div><input class="fc" id="reg-name" placeholder="請輸入真實姓名"></div>
        <div id="reg-err"></div>
        <button class="btn btn-g" onclick="doRegister()">完成並登入 →</button>
        <button class="btn btn-gy" onclick="showOnly('pnl-login')">← 返回</button>
      </div>
    </div>
  </div>

  <div id="pnl-home" class="pnl">
    <div class="row"><div class="av">🤖</div><div class="bub" id="welcome-msg">您好！請選擇下方功能。</div></div>
  </div>

  <div id="pnl-s1" class="pnl">
    <div class="steps"><div class="sd on"></div><div class="sd"></div><div class="sd"></div></div>
    <div class="row"><div class="av">🤖</div><div class="bub">請選擇<b>日期</b>、餐別與取餐地點：</div></div>
    <div class="card">
      <div class="card-hd">📅 步驟 1 — 基本設定</div>
      <div class="card-bd fl">
        <div><div class="lbl">取餐日期</div><select class="fc" id="sel-date"></select></div>
        <div class="row2">
          <div><div class="lbl">餐別</div>
            <select class="fc" id="sel-type">
              <option value="lunch">午餐</option>
              <option value="dinner">晚餐</option>
            </select>
          </div>
          <div><div class="lbl">取餐地點</div>
            <select class="fc" id="sel-loc">
              <option value="douliou">斗六院區</option>
              <option value="huwei">虎尾院區</option>
            </select>
          </div>
        </div>
        <div id="s1-msg"></div>
        <button class="btn btn-g" onclick="goS2()">下一步：選擇餐點 →</button>
      </div>
    </div>
  </div>

  <div id="pnl-s2" class="pnl">
    <div class="steps"><div class="sd on"></div><div class="sd on"></div><div class="sd"></div></div>
    <div class="row"><div class="av">🤖</div><div class="bub" id="s2-hint">請選擇餐點及份數：</div></div>
    <div class="card">
      <div class="card-hd" id="s2-hd">🍽️ 步驟 2 — 選擇餐點</div>
      <div class="card-bd">
        <div id="meal-list"></div>
        <div class="cart">
          <div class="cart-t">🛒 訂單明細 <span id="cart-bdg" class="badge bdg-o" style="display:none"></span></div>
          <div id="cart-rows"><div class="ce">尚未選擇餐點</div></div>
          <div id="cart-tot" class="ct" style="display:none"></div>
        </div>
        <div class="brow" style="margin-top:10px">
          <button class="btn btn-gy" onclick="goS1()">← 返回</button>
          <button class="btn btn-o" onclick="goS3()">確認訂單 →</button>
        </div>
      </div>
    </div>
  </div>

  <div id="pnl-s3" class="pnl">
    <div class="steps"><div class="sd on"></div><div class="sd on"></div><div class="sd on"></div></div>
    <div class="row"><div class="av">🤖</div><div class="bub">請確認後送出：</div></div>
    <div class="card">
      <div class="card-hd">✅ 步驟 3 — 確認送出</div>
      <div class="card-bd">
        <div id="conf-info" class="ci"></div>
        <div id="conf-items"></div>
        <div class="fl" style="margin-top:12px">
          <button class="btn btn-g" onclick="submitOrder()">✅ 確認送出訂單</button>
          <button class="btn btn-gy" onclick="goS2()">← 修改餐點</button>
        </div>
      </div>
    </div>
  </div>

  <div id="pnl-ok" class="pnl">
    <div class="card"><div class="card-bd suc">
      <div class="suc-ico">🎉</div>
      <div class="suc-t">訂單已送出！</div>
      <div id="ok-detail" class="suc-sub"></div>
    </div></div>
    <button class="btn btn-gy" onclick="resetOrder()">📝 再次訂餐</button>
  </div>

  <div id="pnl-pickup" class="pnl">
    <div class="row"><div class="av">🤖</div><div class="bub">您今日的訂餐如下：</div></div>
    <div id="my-orders-list"></div>
    <div id="pickup-empty" style="display:none">
      <div class="card"><div class="card-bd" style="text-align:center;color:var(--gray-400);padding:28px">今日尚無訂餐記錄</div></div>
    </div>
  </div>

</div>
<div class="rmenu">
  <button class="rmb" onclick="showOrder()"><span class="rmi">🍱</span>我要訂餐</button>
  <button class="rmb" onclick="showPickup()"><span class="rmi">🧺</span>我要取餐</button>
</div>
</div>

<div id="loading-overlay" class="loading-overlay">
  <div class="loading-spinner"></div>
  <div style="font-size:14px;color:#4b5563;font-family:sans-serif">連線中，請稍候...</div>
</div>

<div id="today-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-title">📋 您今日已有訂餐</div>
    <div class="modal-sub" id="modal-date-label"></div>
    <div id="modal-items"></div>
    <div class="modal-btns">
      <button class="btn btn-gy" onclick="closeModal()">關閉</button>
      <button class="btn btn-o" onclick="closeModal();showOrder()">繼續追加訂餐</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhIzxK291vy2HpbJSMBXK7-eI5RFeusvw",
  authDomain: "ylh-meal-order-system.firebaseapp.com",
  databaseURL: "https://ylh-meal-order-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ylh-meal-order-system",
  storageBucket: "ylh-meal-order-system.firebasestorage.app",
  messagingSenderId: "605808046207",
  appId: "1:605808046207:web:970ff25e7be3cfcfb24f4a"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

let DB = {menus:{},admins:{},staff:{},orders:{}};
let currentUser = null;
let cart = [];
let orderForm = {};
let dbReady = false;

const $ = id => document.getElementById(id);
function uid(){ return 'o'+Date.now()+Math.random().toString(36).slice(2,6); }

/* ── 共用標籤函式 ── */
function dishLbl(d){
  return {main1:'主菜一',main2:'主菜二',veg:'素食',
          dinnerMain1:'晚餐主菜一',dinnerMain2:'晚餐主菜二',dinnerVeg:'晚餐素食'}[d]||d;
}
function dishName(d, menu){
  if(!menu) return dishLbl(d);
  return menu[d] || dishLbl(d);
}
function dishFull(d, menu){ return dishLbl(d)+'：'+dishName(d,menu); }
function riceLbl(r){ return r==='white'?'白飯':'養生飯'; }
function locLbl(l) { return l==='douliou'?'斗六院區':'虎尾院區'; }
function typeLbl(t){ return t==='lunch'?'午餐':'晚餐'; }
function fmtD(d)   { return d?d.replace(/-/g,'/'):''; }
function todayISO(){ return new Date().toISOString().slice(0,10); }

function isClosed(dateStr){
  const today=todayISO();
  if(dateStr<today) return true;
  if(dateStr===today) return new Date()>=new Date(dateStr+'T09:00:00');
  return false;
}
function getMenu(d){ return (DB.menus||{})[d]; }
function main1Count(dateStr,dishKey){
  return Object.values(DB.orders||{}).filter(o=>o.date===dateStr&&o.dish===dishKey).reduce((s,o)=>s+o.qty,0);
}
function effectiveDate(){
  const today=todayISO();
  const keys=Object.keys(DB.menus||{}).sort();
  if(keys.includes(today)) return today;
  return keys.find(k=>k>today)||keys[keys.length-1]||today;
}
function showOnly(id){
  ['pnl-login','pnl-register','pnl-home','pnl-s1','pnl-s2','pnl-s3','pnl-ok','pnl-pickup']
    .forEach(p=>{ const el=$(p); if(el) el.className='pnl'+(p===id?' on':''); });
  $('chat').scrollTo(0,0);
}
function toast(msg,type='g'){
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:${type==='r'?'#dc2626':'#06C755'};color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:0 4px 14px rgba(0,0,0,.18);z-index:999;white-space:nowrap`;
  el.textContent=msg; document.body.appendChild(el);
  setTimeout(()=>el.remove(),2600);
}
function setErr(id,msg){ const e=$(id); if(e) e.innerHTML=msg?`<div class="al al-r">${msg}</div>`:''; }
function setMsg(id,msg,tp='y'){ const e=$(id); if(e) e.innerHTML=msg?`<div class="al al-${tp}">${msg}</div>`:''; }
function closeModal(){ $('today-modal').style.display='none'; }

/* ── Firebase ── */
onValue(ref(db,'/'),snap=>{
  DB=snap.val()||{menus:{},admins:{},staff:{},orders:{}};
  if(!dbReady){
    dbReady=true;
    $('loading-overlay').style.display='none';
    $('bar-sub').textContent='已連線 — 跨裝置同步';
  }
  const active=document.querySelector('.pnl.on');
  if(active){
    const id=active.id;
    if(id==='pnl-s1') populateDateSelect();
    if(id==='pnl-s2') renderMealList();
    if(id==='pnl-pickup') renderMyPickup();
  }
});

async function fbSet(path,val){ await set(ref(db,path),val); }
async function fbUpdate(updates){ await update(ref(db,'/'),updates); }

/* ── Auth ── */
function doLogin(){
  const emp=$('inp-emp').value.trim().toUpperCase();
  if(!emp){ setErr('login-err','請輸入員編'); return; }
  const user=(DB.staff||{})[emp]||(DB.admins||{})[emp];
  if(!user){ $('reg-emp').value=emp; setErr('login-err',''); showOnly('pnl-register'); return; }
  currentUser=user; afterLogin();
}

function afterLogin(){
  $('bar-sub').textContent=(currentUser.name||currentUser.emp)+'（'+currentUser.dept+'）';
  $('logout-btn').style.display='block';
  $('welcome-msg').textContent=`您好，${currentUser.name||currentUser.emp}！請選擇下方功能 👇`;
  const chkDate=effectiveDate();
  const todayOrds=Object.values(DB.orders||{}).filter(o=>o.emp===currentUser.emp&&o.date===chkDate);
  if(todayOrds.length>0) showTodayModal(todayOrds,chkDate);
  showOnly('pnl-home');
}

function showTodayModal(orders,dateStr){
  const menu=getMenu(dateStr);
  const merged={};
  orders.forEach(o=>{
    const k=o.dish+'-'+o.rice+'-'+o.mealType;
    if(!merged[k]) merged[k]={...o}; else merged[k].qty+=o.qty;
  });
  let html='';
  Object.values(merged).forEach(o=>{
    const full=dishFull(o.dish,menu);
    html+=`<div class="modal-item"><span>${typeLbl(o.mealType)}｜${full}（${riceLbl(o.rice)}）</span><span style="font-weight:700;margin-left:8px;flex-shrink:0">${o.qty} 份</span></div>`;
  });
  $('modal-date-label').textContent='日期：'+fmtD(dateStr);
  $('modal-items').innerHTML=html;
  $('today-modal').style.display='flex';
}

function doLogout(){
  currentUser=null; cart=[]; orderForm={};
  $('bar-sub').textContent='已連線 — 跨裝置同步';
  $('logout-btn').style.display='none';
  $('inp-emp').value='';
  setErr('login-err','');
  $('today-modal').style.display='none';
  showOnly('pnl-login');
}

function showRegister(){
  const emp=$('inp-emp').value.trim().toUpperCase();
  if(emp) $('reg-emp').value=emp;
  setErr('reg-err','');
  showOnly('pnl-register');
}

async function doRegister(){
  const emp=$('reg-emp').value.trim().toUpperCase();
  const dept=$('reg-dept').value.trim();
  const name=$('reg-name').value.trim();
  if(!emp){ setErr('reg-err','請輸入員編'); return; }
  if(!name){ setErr('reg-err','請輸入姓名'); return; }
  if(!dept){ setErr('reg-err','請輸入單位'); return; }
  await fbSet('staff/'+emp,{emp,dept,name});
  currentUser={emp,dept,name};
  toast('資料已建立，歡迎 '+name+'！');
  afterLogin();
}

/* ── Order ── */
function showOrder(){
  if(!currentUser){ toast('請先登入','r'); showOnly('pnl-login'); return; }
  populateDateSelect(); setMsg('s1-msg',''); showOnly('pnl-s1');
}

function populateDateSelect(){
  const sel=$('sel-date'); if(!sel) return;
  const cur=sel.value;
  sel.innerHTML='<option value="">請選擇日期</option>';
  const today=todayISO();
  Object.keys(DB.menus||{}).sort().forEach(d=>{
    if(d<today) return;
    const m=DB.menus[d];
    const closed=isClosed(d);
    let label=fmtD(d);
    if(m.holiday) label+='（假日不供餐）';
    else if(closed) label+='（已截止）';
    const opt=document.createElement('option');
    opt.value=d; opt.textContent=label;
    if(m.holiday||closed) opt.disabled=true;
    if(d===cur) opt.selected=true;
    sel.appendChild(opt);
  });
  if(!sel.value){
    const first=[...sel.options].find(o=>o.value&&!o.disabled);
    if(first) first.selected=true;
  }
}

function goS2(){
  const date=$('sel-date').value;
  const mealType=$('sel-type').value;
  const loc=$('sel-loc').value;
  if(!date){ setMsg('s1-msg','⚠️ 請選擇取餐日期','r'); return; }
  const menu=getMenu(date);
  if(!menu){ setMsg('s1-msg','⚠️ 此日期無菜單','r'); return; }
  if(menu.holiday){ setMsg('s1-msg','⚠️ 此日為假日，不供餐','r'); return; }
  if(isClosed(date)){ setMsg('s1-msg','🔒 本日訂餐已截止（09:00）','r'); return; }
  setMsg('s1-msg','');
  orderForm={date,mealType,loc,menu};
  cart=[];
  renderMealList();
  renderCart();
  showOnly('pnl-s2');
}

function goS1(){ showOnly('pnl-s1'); }
function goS3(){
  if(!cart.length){ toast('請先選擇至少一樣餐點','r'); return; }
  renderConfirm(); showOnly('pnl-s3');
}

/* ── 餐點清單：午餐3種＋晚餐3種，各×白飯/養生飯 ── */
function renderMealList(){
  const {date,mealType,menu}=orderForm;

  /* 動態標題 */
  $('s2-hd').textContent = mealType==='lunch'?'🌞 步驟 2 — 選擇午餐':'🌙 步驟 2 — 選擇晚餐';
  $('s2-hint').textContent = mealType==='lunch'
    ? '以下午餐三種主食，各可選白飯或養生飯：'
    : '以下晚餐三種主食，各可選白飯或養生飯：';

  /* 午餐 dish keys */
  const lunchDishes = [
    { key:'main1',      name:menu.main1||'主菜一',      limit:menu.main1Limit||80 },
    { key:'main2',      name:menu.main2||'主菜二' },
    { key:'veg',        name:menu.veg||'素食' },
  ];
  /* 晚餐 dish keys */
  const dinnerDishes = [
    { key:'dinnerMain1', name:menu.dinnerMain1||menu.dinner||'晚餐主菜一', limit:menu.dinnerMain1Limit||0 },
    { key:'dinnerMain2', name:menu.dinnerMain2||'晚餐主菜二' },
    { key:'dinnerVeg',   name:menu.dinnerVeg||'晚餐素食' },
  ];

  const dishes = mealType==='lunch' ? lunchDishes : dinnerDishes;
  const sectionLabel = mealType==='lunch' ? '🌞 午餐' : '🌙 晚餐';

  let html=`<div class="meal-section-hd ${mealType==='dinner'?'dinner':''}">${sectionLabel}</div>`;

  dishes.forEach(d=>{
    const m1count = d.limit ? main1Count(date,d.key) : 0;
    const sold = d.limit>0 && m1count>=d.limit;

    ['white','health'].forEach(riceType=>{
      const rk=d.key+'-'+riceType;
      const ci=cart.find(c=>c.dish===d.key&&c.rice===riceType);
      const qty=ci?ci.qty:0;
      const rn=riceType==='white'?'白飯':'養生飯';
      const isSold=sold;
      const soldTag=isSold?'<span class="sold-tag">已售完</span>':'';
      const limitTag=(d.limit>0&&!isSold)?`<span class="limit-tag">限${d.limit}份，已訂${m1count}</span>`:'';
      const cartName=`${dishLbl(d.key)}：${d.name}＋${rn}`;

      html+=`
      <div class="mi ${qty>0?'sel':''} ${isSold?'sold':''}" id="mi-${rk}">
        <div class="mi-name">
          <span>${d.name}＋${rn}</span>
          ${soldTag}${limitTag}
        </div>
        <div class="mi-sub">${dishLbl(d.key)}</div>
        <div class="qty-row" style="margin-top:8px">
          <span class="ql">份數：</span>
          <button class="qb" onclick="chgQty('${d.key}','${riceType}',-1,'${cartName}')">−</button>
          <span class="qn" id="qn-${rk}">${qty}</span>
          <button class="qb" onclick="chgQty('${d.key}','${riceType}',1,'${cartName}')">＋</button>
        </div>
      </div>`;
    });
  });

  $('meal-list').innerHTML=html;
}

function chgQty(dish,riceType,delta,name){
  let ci=cart.find(c=>c.dish===dish&&c.rice===riceType);
  if(!ci){ if(delta<=0) return; ci={dish,rice:riceType,name,qty:0}; cart.push(ci); }
  ci.qty=Math.max(0,ci.qty+delta);
  if(ci.qty===0) cart=cart.filter(c=>!(c.dish===dish&&c.rice===riceType));
  const rk=dish+'-'+riceType;
  const qel=$('qn-'+rk); if(qel) qel.textContent=ci.qty;
  const mi=$('mi-'+rk); if(mi) mi.classList.toggle('sel',ci.qty>0);
  renderCart();
}

function renderCart(){
  const rows=$('cart-rows'),tot=$('cart-tot'),bdg=$('cart-bdg');
  if(!cart.length){ rows.innerHTML='<div class="ce">尚未選擇餐點</div>'; tot.style.display='none'; bdg.style.display='none'; return; }
  const total=cart.reduce((s,c)=>s+c.qty,0);
  bdg.textContent=total+' 份'; bdg.style.display='inline-block';
  rows.innerHTML=cart.map(c=>`<div class="cr"><span>${c.name}</span><span><b>${c.qty}</b> 份</span></div>`).join('');
  tot.textContent='合計：'+total+' 份'; tot.style.display='block';
}

function renderConfirm(){
  const {date,mealType,loc}=orderForm;
  $('conf-info').innerHTML=`📅 ${fmtD(date)}　🍽️ ${typeLbl(mealType)}　📍 ${locLbl(loc)}`;
  $('conf-items').innerHTML=cart.map(c=>`<div class="cr"><span>${c.name}</span><span><b>${c.qty}</b> 份</span></div>`).join('');
}

async function submitOrder(){
  const {date,mealType,loc}=orderForm;
  const updates={};
  cart.forEach(c=>{
    const id='o'+Date.now()+Math.random().toString(36).slice(2,6);
    updates['orders/'+id]={
      id, emp:currentUser.emp, name:currentUser.name||currentUser.emp,
      dept:currentUser.dept||'實習生', date, mealType, loc,
      dish:c.dish, rice:c.rice, qty:c.qty,
      dishName:c.name,  /* 儲存實際菜名方便取餐頁顯示 */
      status:'pending', ts:Date.now()
    };
  });
  await fbUpdate(updates);
  const items=cart.map(c=>`${c.name} × ${c.qty}`).join('<br>');
  $('ok-detail').innerHTML=`📅 ${fmtD(date)}　${typeLbl(mealType)}<br>📍 ${locLbl(loc)}<br>${items}`;
  cart=[]; showOnly('pnl-ok'); toast('訂單送出成功！');
}

function resetOrder(){ cart=[]; orderForm={}; populateDateSelect(); showOnly('pnl-s1'); }

/* ── Pickup ── */
function showPickup(){
  if(!currentUser){ toast('請先登入','r'); showOnly('pnl-login'); return; }
  renderMyPickup(); showOnly('pnl-pickup');
}

function renderMyPickup(){
  const chkDate=effectiveDate();
  const myOrds=Object.values(DB.orders||{}).filter(o=>o.emp===currentUser.emp&&o.date===chkDate);
  const list=$('my-orders-list'), empty=$('pickup-empty');
  if(!myOrds.length){ list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  const menu=getMenu(chkDate);
  const merged={};
  myOrds.forEach(o=>{
    const k=o.dish+'-'+o.rice;
    if(!merged[k]) merged[k]={...o}; else merged[k].qty+=o.qty;
  });
  list.innerHTML=Object.values(merged).map(o=>{
    /* 優先用訂單內儲存的 dishName，次選 menu，最後用 dishLbl */
    const nm=o.dishName||dishName(o.dish,menu)||dishLbl(o.dish);
    return `
    <div class="pcard ${o.status==='done'?'done':''}">
      <div class="pc-name">${dishLbl(o.dish)}：${nm}</div>
      <div class="pc-items">
        ${riceLbl(o.rice)} × ${o.qty} 份<br>
        📍 ${locLbl(o.loc)}　🍽️ ${typeLbl(o.mealType)}<br>
        📅 ${fmtD(o.date)}
      </div>
      <button class="btn ${o.status==='done'?'btn-gy':'btn-g'}" ${o.status==='done'?'disabled':''} onclick="doMyPickup('${o.id}')">
        ${o.status==='done'?'✅ 已領取':'🙋 確認領取'}
      </button>
    </div>`;
  }).join('');
}

async function doMyPickup(id){
  await set(ref(db,'orders/'+id+'/status'),'done');
  toast('已確認領取！');
}

window.doLogin=doLogin; window.doLogout=doLogout;
window.showRegister=showRegister; window.doRegister=doRegister;
window.showOrder=showOrder; window.showPickup=showPickup;
window.goS1=goS1; window.goS2=goS2; window.goS3=goS3;
window.chgQty=chgQty;
window.submitOrder=submitOrder; window.resetOrder=resetOrder;
window.doMyPickup=doMyPickup; window.closeModal=closeModal;
</script>
